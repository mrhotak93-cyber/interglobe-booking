<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Booking InterGlobe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
background:white;
border-radius:10px;
margin-top:40px;
box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

h1{
color:#17365d;
margin-top:0;
}

.section{
margin-bottom:25px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#17365d;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1f4c83;
}

.summary{
background:#f8fafc;
border:1px solid #e5e7eb;
padding:15px;
border-radius:8px;
margin-top:20px;
}

.option{
margin-bottom:8px;
}

.price{
font-size:20px;
font-weight:bold;
color:#17365d;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Réservation transport</h1>

<div id="decodeWarning" style="display:none;color:red;margin-bottom:20px;">
Impossible de charger le devis.
</div>

<div class="section">
<h3>Trajet</h3>

<div>Véhicule : <strong id="vehicleName">-</strong></div>
<div>Collecte : <span id="pickupPostal">-</span> (<span id="pickupCountry">-</span>)</div>
<div>Livraison : <span id="deliveryPostal">-</span> (<span id="deliveryCountry">-</span>)</div>

</div>

<div class="section">

<h3>Options</h3>

<label class="option">
<input type="checkbox" id="opt_loading_help">
Aide au chargement
</label>

<label class="option">
<input type="checkbox" id="opt_unloading_help">
Aide au déchargement
</label>

<label class="option">
<input type="checkbox" id="opt_tail_lift">
Hayon élévateur
</label>

<label class="option">
<input type="checkbox" id="opt_paper_invoice">
Facture papier
</label>

</div>

<div class="section">

<h3>Facturation</h3>

<input id="billing_name" placeholder="Nom">
<input id="billing_company" placeholder="Société">
<input id="billing_email" placeholder="Email">
<input id="billing_phone" placeholder="Téléphone">

<select id="billing_country">
<option value="">Pays</option>
<option value="Belgique">Belgique</option>
<option value="France">France</option>
<option value="Pays-Bas">Pays-Bas</option>
<option value="Luxembourg">Luxembourg</option>
<option value="Allemagne">Allemagne</option>
</select>

<input id="billing_vat" placeholder="Numéro TVA (optionnel)">

</div>

<div class="summary">

<div>Prix base HTVA : <span id="basePrice">0 €</span></div>
<div>Options : <span id="optionsPrice">0 €</span></div>
<div>TVA : <span id="vatPrice">0 €</span></div>

<div class="price">
Total : <span id="totalPrice">0 €</span>
</div>

</div>

<div style="margin-top:25px;">
<button id="submitBtn">Payer</button>
</div>

<div id="paymentStatus" style="margin-top:15px;"></div>

<input type="hidden" id="reservationNumberField">
<input type="hidden" id="summaryField">

</div>

<script>

const PAYMENT_WORKER_URL="https://long-cake-e1c6.interglobe1932.workers.dev/create-payment";
const QUOTE_READ_URL="https://long-cake-e1c6.interglobe1932.workers.dev/quote";

let currentQuoteId="";
let basePrice=0;
let vehicleName="";
let pickupPostal="";
let deliveryPostal="";
let pickupCountry="";
let deliveryCountry="";

function getUrlParam(name){
const params=new URLSearchParams(window.location.search);
return params.get(name);
}

function formatPrice(v){
return Number(v).toFixed(2)+" €";
}

function calculateOptions(){

let total=0;

if(document.getElementById("opt_loading_help").checked) total+=25;
if(document.getElementById("opt_unloading_help").checked) total+=25;
if(document.getElementById("opt_tail_lift").checked) total+=30;
if(document.getElementById("opt_paper_invoice").checked) total+=10;

return total;

}

function calculateTotals(){

const optionsTotal=calculateOptions();
const totalHtva=basePrice+optionsTotal;

let vat=0;

const country=document.getElementById("billing_country").value;
const vatNumber=document.getElementById("billing_vat").value;

if(country==="Belgique" || (country!=="" && vatNumber==="")){
vat=totalHtva*0.21;
}

const total=totalHtva+vat;

return{
optionsTotal,
vat,
total
}

}

function updateSummary(){

const totals=calculateTotals();

document.getElementById("basePrice").innerText=formatPrice(basePrice);
document.getElementById("optionsPrice").innerText=formatPrice(totals.optionsTotal);
document.getElementById("vatPrice").innerText=formatPrice(totals.vat);
document.getElementById("totalPrice").innerText=formatPrice(totals.total);

}

async function loadQuote(){

const quoteId=getUrlParam("quoteId");

if(!quoteId){
document.getElementById("decodeWarning").style.display="block";
return;
}

const res=await fetch(`${QUOTE_READ_URL}?quoteId=${quoteId}`);
const quote=await res.json();

currentQuoteId=quote.quoteId;

basePrice=parseFloat(quote.basePriceHtva||0);
vehicleName=quote.vehicleName;
pickupPostal=quote.pickupPostal;
pickupCountry=quote.pickupCountry;
deliveryPostal=quote.deliveryPostal;
deliveryCountry=quote.deliveryCountry;

document.getElementById("vehicleName").innerText=vehicleName;
document.getElementById("pickupPostal").innerText=pickupPostal;
document.getElementById("pickupCountry").innerText=pickupCountry;
document.getElementById("deliveryPostal").innerText=deliveryPostal;
document.getElementById("deliveryCountry").innerText=deliveryCountry;

updateSummary();

}

function generateReservationNumber(){
return Date.now().toString();
}

function safeValue(id){
return document.getElementById(id)?.value||"";
}

async function startMolliePayment(){

updateSummary();

const reservationNumber=generateReservationNumber();

const payload={
quoteId:currentQuoteId,
reservationNumber:reservationNumber,

billingEmail:safeValue("billing_email"),
billingName:safeValue("billing_name"),
billingCompany:safeValue("billing_company"),
billingPhone:safeValue("billing_phone"),

billingCountry:safeValue("billing_country"),
billingVat:safeValue("billing_vat"),

options:{
loadingHelp:document.getElementById("opt_loading_help").checked,
unloadingHelp:document.getElementById("opt_unloading_help").checked,
paperInvoice:document.getElementById("opt_paper_invoice").checked,
tailLift:document.getElementById("opt_tail_lift").checked
}

};

const response=await fetch(PAYMENT_WORKER_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

const result=await response.json();

if(result.checkout){
window.location.href=result.checkout;
}else{
document.getElementById("paymentStatus").innerText="Erreur paiement";
}

}

document.getElementById("submitBtn").addEventListener("click",startMolliePayment);

document.querySelectorAll("input,select").forEach(el=>{
el.addEventListener("change",updateSummary);
});

loadQuote();

</script>

</body>
</html>
